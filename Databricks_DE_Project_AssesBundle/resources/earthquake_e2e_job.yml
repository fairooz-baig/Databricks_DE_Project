resources:
  jobs:
    E2E_EarthQuake_Project:
      name: E2E_EarthQuake_Project_Prod   #updated
      tasks:
        - task_key: Ingestion_Bronze
          notebook_task:
            notebook_path: ../src/notebooks/Ingestion_Bronze.ipynb
            base_parameters:
              catalog_name: ${var.catalog}
            source: WORKSPACE
        - task_key: Bronze_Silver_Earthquake_01
          depends_on:
            - task_key: Ingestion_Bronze
          pipeline_task:
            pipeline_id: ${resources.pipelines.Bronze_Silver_earthquake_etl.id}
            full_refresh: false
        - task_key: EarthQuake_Dashboard
          depends_on:
            - task_key: Bronze_Silver_Earthquake_01
          dashboard_task:
            subscription: {}
            warehouse_id: b3a1e6bf1f318106
            dashboard_id: ${resources.dashboards.earthquake_monitor.id}
      run_as:
        service_principal_name: ${var.spn_id}

      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.catalog}
      performance_target: PERFORMANCE_OPTIMIZED
